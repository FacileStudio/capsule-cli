version: 2

builds:
  - main: .
    binary: capsule
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: FacileStudio
      name: homebrew-tap
    name: capsule
    homepage: https://github.com/FacileStudio/capsule-cli
    description: Zero-knowledge encrypted paste sharing from the terminal

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
